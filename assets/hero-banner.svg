    <!-- Orange C shape -->
    <path d="M155 0A140 140 0 1 0 155 280h0a24 24 0 0 0 0-48h0a92 92 0 1 1 0-184h0a24 24 0 0 0 0-48Z" fill="url(#cGrad)"/>
    <!-- Council dots -->
    <circle cx="90" cy="107" r="11" fill="#6b7589" opacity="0.85"/>
    <circle cx="125" cy="97" r="10" fill="#6b7589" opacity="0.8"/>
    <circle cx="160" cy="107" r="9" fill="#6b7589" opacity="0.75"/>
    <circle cx="82" cy="140" r="10" fill="#6b7589" opacity="0.8"/>
    <circle cx="125" cy="140" r="13" fill="#e91e63"/>
    <circle cx="168" cy="140" r="10" fill="#56d7e5" opacity="0.9"/>
    <circle cx="90" cy="173" r="11" fill="#6b7589" opacity="0.85"/>
    <circle cx="125" cy="183" r="10" fill="#6b7589" opacity="0.8"/>
    <circle cx="160" cy="173" r="9" fill="#6b7589" opacity="0.75"/>
