  <text x="600" y="300" text-anchor="middle" fill="white" font-family="Georgia,'Times New Roman',serif" font-size="60" font-weight="700" letter-spacing="14">COUNCIL</text>

  <!-- Subtitle tagline -->
  <text x="600" y="330" text-anchor="middle" fill="#c8c8e0" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="300" letter-spacing="1.5" opacity="0.7">Multi-Agent AI Social Deduction  ·  Local-First Real-Time Sync  ·  3D Immersive Experience</text>

  <!-- ============ TECH PARTNER LOGOS ROW ============ -->
  <g transform="translate(600, 380)">
    <!-- Divider line -->
    <line x1="-300" y1="-20" x2="300" y2="-20" stroke="#2a2a4a" stroke-width="0.5" opacity="0.6"/>

    <!-- Mistral AI (official rainbow M) -->
    <g transform="translate(-200, 0)">
      <g transform="translate(-12, -10) scale(0.75)">
        <rect width="5.5" height="5.5" fill="#FFD800"/>
        <rect x="23.5" width="5.5" height="5.5" fill="#FFD800"/>
        <rect y="5.5" width="11.5" height="5.5" fill="#FFAF00"/>
        <rect x="17.5" y="5.5" width="11.5" height="5.5" fill="#FFAF00"/>
        <rect y="11" width="29" height="5.5" fill="#FF8205"/>
        <rect y="16.5" width="5.5" height="5.5" fill="#FA500F"/>
        <rect x="11.5" y="16.5" width="5.5" height="5.5" fill="#FA500F"/>
        <rect x="23.5" y="16.5" width="5.5" height="5.5" fill="#FA500F"/>
        <rect y="22" width="17.5" height="5.5" fill="#E10500"/>
        <rect x="11.5" y="22" width="17.5" height="5.5" fill="#E10500"/>
