      <text x="12" y="5" fill="#86efac" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" opacity="0.8">Supabase</text>
    </g>
  </g>

  <!-- Decorative corner brackets -->
  <g stroke="#ff6b35" stroke-width="1" opacity="0.2" stroke-linecap="round">
    <path d="M20,20 L20,50 M20,20 L50,20"/>
    <path d="M1180,20 L1180,50 M1180,20 L1150,20"/>
    <path d="M20,420 L20,390 M20,420 L50,420"/>
    <path d="M1180,420 L1180,390 M1180,420 L1150,420"/>
  </g>

  <!-- Side labels -->
  <text x="30" y="220" fill="#ff6b35" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="8" font-weight="400" opacity="0.3" letter-spacing="2" transform="rotate(-90, 30, 220)">REAL-TIME SYNC</text>
  <text x="1170" y="220" fill="#c44dff" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="8" font-weight="400" opacity="0.3" letter-spacing="2" transform="rotate(90, 1170, 220)">LOCAL-FIRST</text>
</svg>
