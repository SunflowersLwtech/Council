    <g transform="translate(-55, 0)">
      <g transform="translate(-18, -12) scale(0.065)">
        <path fill="url(#heroPsGrad1)" d="M373.25,140.55l-44.88-77.73c-5.53-9.57-15.74-15.47-26.8-15.47h-46.24c-3.97,0-6.45,4.3-4.47,7.74l10.04,17.39c1.84,3.19,5.25,5.16,8.93,5.16h20.21c7.37,0,14.18,3.93,17.86,10.32l33.35,57.76c3.69,6.38,3.69,14.25,0,20.63l-33.35,57.76c-3.68,6.38-10.49,10.32-17.87,10.32h-66.7c-7.37,0-14.18-3.93-17.87-10.32l-72.13-124.94c-1.99-3.44.5-7.74,4.47-7.74h20.21c3.97,0,6.45-4.3,4.47-7.74l-10.04-17.39c-1.84-3.19-5.25-5.16-8.93-5.16h-43.64c-3.69,0-7.09,1.97-8.93,5.16l-21.82,37.8c-1.84,3.19-1.84,7.12,0,10.31l10.04,17.39c1.99,3.44,6.95,3.44,8.93,0l10.1-17.5c1.98-3.44,6.95-3.44,8.93,0l77.9,134.93c5.53,9.57,15.74,15.47,26.8,15.47h89.75c11.06,0,21.27-5.9,26.8-15.47l44.88-77.73c5.53-9.57,5.53-21.37,0-30.94Z"/>
        <path fill="url(#heroPsGrad2)" d="M117.49,192.8c-1.84-3.19-5.25-5.16-8.93-5.16h-20.21c-7.37,0-14.18-3.93-17.86-10.32l-33.35-57.76c-3.69-6.38-3.69-14.25,0-20.63l33.35-57.76c3.69-6.38,10.5-10.32,17.87-10.31h66.7c7.37,0,14.18,3.93,17.86,10.32l72.13,124.94c1.99,3.44-.5,7.74-4.47,7.74h-20.21c-3.97,0-6.45,4.3-4.47,7.74l10.04,17.39c1.84,3.19,5.25,5.16,8.93,5.16h43.64c3.69,0,7.09-1.97,8.93-5.16l21.82-37.8c1.84-3.19,1.84-7.12,0-10.31l-10.04-17.39c-1.98-3.44-6.95-3.44-8.93,0l-10.1,17.5c-1.99,3.44-6.95,3.44-8.93,0L193.37,16.05c-5.53-9.57-15.74-15.47-26.8-15.47h-89.75c-11.06,0-21.27,5.9-26.8,15.47L5.15,93.78c-5.53,9.57-5.53,21.37,0,30.94l44.88,77.73c5.53,9.57,15.74,15.47,26.8,15.47h46.24c3.97,0,6.45-4.3,4.47-7.74l-10.04-17.39Z"/>
      </g>
      <text x="10" y="5" fill="#7cb3ff" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" opacity="0.8">PowerSync</text>
    </g>

    <!-- Gemini TTS (Google 4-color dots) -->
    <g transform="translate(90, 0)">
      <g transform="translate(-12, -8)">
        <circle cx="3.5" cy="3.5" r="3.5" fill="#4285F4"/>
        <circle cx="12.5" cy="3.5" r="3.5" fill="#EA4335"/>
        <circle cx="3.5" cy="12.5" r="3.5" fill="#34A853"/>
        <circle cx="12.5" cy="12.5" r="3.5" fill="#FBBC05"/>
      </g>
      <text x="8" y="5" fill="#8ab4f8" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500" opacity="0.8">Gemini TTS</text>
    </g>

    <!-- Supabase (official lightning bolt) -->
    <g transform="translate(220, 0)">
      <g transform="translate(-12, -12) scale(0.22)">
        <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#heroSupaGrad1)"/>
        <path d="M45.317 2.07103C48.1765 -1.53037 53.9745 0.442937 54.0434 5.041L54.4849 72.2922H9.83113C1.64038 72.2922 -2.92775 62.8321 2.1655 56.4175L45.317 2.07103Z" fill="#3ECF8E"/>
