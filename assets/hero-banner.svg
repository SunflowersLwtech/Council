    <line x1="150" y1="80" x2="220" y2="38"/>
    <line x1="900" y1="42" x2="980" y2="72"/>
    <line x1="980" y1="72" x2="1050" y2="35"/>
    <line x1="1050" y1="35" x2="1120" y2="62"/>
