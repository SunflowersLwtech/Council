<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff8f5e"/>
    </linearGradient>
    <linearGradient id="cGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#f25a1c"/>
    </linearGradient>
    <linearGradient id="psGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c44dff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="mistralGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7000"/>
      <stop offset="100%" stop-color="#ffbd59"/>
    </linearGradient>
    <linearGradient id="supaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fcf8e"/>
      <stop offset="100%" stop-color="#2da872"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#ff6b35" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="psGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c44dff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c44dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroPsGrad1" x1="0" y1="0" x2="1" y2="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#05f"/>
      <stop offset="1" stop-color="#00d5ff"/>
    </linearGradient>
    <linearGradient id="heroPsGrad2" x1="1" y1="1" x2="0" y2="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#05f"/>
      <stop offset="1" stop-color="#a0f"/>
    </linearGradient>
    <linearGradient id="heroSupaGrad1" x1="0" y1="0.5" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#249361"/>
      <stop offset="1" stop-color="#3ECF8E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="440" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#c8c8e0">
