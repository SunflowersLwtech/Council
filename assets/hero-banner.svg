    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="200" y1="0" x2="200" y2="440"/>
    <line x1="400" y1="0" x2="400" y2="440"/>
    <line x1="600" y1="0" x2="600" y2="440"/>
    <line x1="800" y1="0" x2="800" y2="440"/>
    <line x1="1000" y1="0" x2="1000" y2="440"/>
  </g>

  <!-- Center glow -->
  <ellipse cx="600" cy="200" rx="450" ry="220" fill="url(#centerGlow)"/>
  <ellipse cx="600" cy="380" rx="300" ry="80" fill="url(#psGlow)"/>

  <!-- Constellation dots -->
  <g fill="#c8c8e0" opacity="0.12">
    <circle cx="80" cy="50" r="1.2"/><circle cx="150" cy="80" r="0.8"/>
    <circle cx="220" cy="38" r="1"/><circle cx="310" cy="65" r="0.6"/>
    <circle cx="900" cy="42" r="1"/><circle cx="980" cy="72" r="0.8"/>
    <circle cx="1050" cy="35" r="1.2"/><circle cx="1120" cy="62" r="0.6"/>
    <circle cx="100" cy="380" r="0.8"/><circle cx="180" cy="400" r="1"/>
    <circle cx="1020" cy="370" r="1"/><circle cx="1100" cy="395" r="0.8"/>
    <circle cx="60" cy="200" r="0.6"/><circle cx="1140" cy="190" r="0.6"/>
