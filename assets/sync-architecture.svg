<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0f0f20"/>
    </linearGradient>
    <linearGradient id="streamPublic" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fcf8e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3fcf8e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="streamPrivate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44dff"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fcf8e"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Title with official PowerSync icon -->
  <linearGradient id="syncPsGrad1" x1="0" y1="0" x2="1" y2="0.5" gradientUnits="objectBoundingBox">
    <stop offset="0" stop-color="#05f"/><stop offset="1" stop-color="#00d5ff"/>
  </linearGradient>
  <linearGradient id="syncPsGrad2" x1="1" y1="1" x2="0" y2="0.5" gradientUnits="objectBoundingBox">
    <stop offset="0" stop-color="#05f"/><stop offset="1" stop-color="#a0f"/>
  </linearGradient>
  <g transform="translate(466, 21) scale(0.06)">
    <path fill="url(#syncPsGrad1)" d="M373.25,140.55l-44.88-77.73c-5.53-9.57-15.74-15.47-26.8-15.47h-46.24c-3.97,0-6.45,4.3-4.47,7.74l10.04,17.39c1.84,3.19,5.25,5.16,8.93,5.16h20.21c7.37,0,14.18,3.93,17.86,10.32l33.35,57.76c3.69,6.38,3.69,14.25,0,20.63l-33.35,57.76c-3.68,6.38-10.49,10.32-17.87,10.32h-66.7c-7.37,0-14.18-3.93-17.87-10.32l-72.13-124.94c-1.99-3.44.5-7.74,4.47-7.74h20.21c3.97,0,6.45-4.3,4.47-7.74l-10.04-17.39c-1.84-3.19-5.25-5.16-8.93-5.16h-43.64c-3.69,0-7.09,1.97-8.93,5.16l-21.82,37.8c-1.84,3.19-1.84,7.12,0,10.31l10.04,17.39c1.99,3.44,6.95,3.44,8.93,0l10.1-17.5c1.98-3.44,6.95-3.44,8.93,0l77.9,134.93c5.53,9.57,15.74,15.47,26.8,15.47h89.75c11.06,0,21.27-5.9,26.8-15.47l44.88-77.73c5.53-9.57,5.53-21.37,0-30.94Z"/>
    <path fill="url(#syncPsGrad2)" d="M117.49,192.8c-1.84-3.19-5.25-5.16-8.93-5.16h-20.21c-7.37,0-14.18-3.93-17.86-10.32l-33.35-57.76c-3.69-6.38-3.69-14.25,0-20.63l33.35-57.76c3.69-6.38,10.5-10.32,17.87-10.31h66.7c7.37,0,14.18,3.93,17.86,10.32l72.13,124.94c1.99,3.44-.5,7.74-4.47,7.74h-20.21c-3.97,0-6.45,4.3-4.47,7.74l10.04,17.39c1.84,3.19,5.25,5.16,8.93,5.16h43.64c3.69,0,7.09-1.97,8.93-5.16l21.82-37.8c1.84-3.19,1.84-7.12,0-10.31l-10.04-17.39c-1.98-3.44-6.95-3.44-8.93,0l-10.1,17.5c-1.99,3.44-6.95,3.44-8.93,0L193.37,16.05c-5.53-9.57-15.74-15.47-26.8-15.47h-89.75c-11.06,0-21.27,5.9-26.8,15.47L5.15,93.78c-5.53,9.57-5.53,21.37,0,30.94l44.88,77.73c5.53,9.57,15.74,15.47,26.8,15.47h46.24c3.97,0,6.45-4.3,4.47-7.74l-10.04-17.39Z"/>
  </g>
  <text x="610" y="40" text-anchor="middle" fill="white" font-family="'Playfair Display',Georgia,serif" font-size="22" font-weight="700" letter-spacing="4">POWERSYNC SYNC ARCHITECTURE</text>
  <text x="600" y="60" text-anchor="middle" fill="#c44dff" font-family="Inter,system-ui,sans-serif" font-size="11" opacity="0.6">6 Sync Streams · Row-Level Permission Isolation · Local-First SQLite</text>

  <!-- ==================== LEFT: Supabase Tables ==================== -->
  <rect x="30" y="85" width="280" height="490" rx="8" fill="#1a1a3a" stroke="#3fcf8e" stroke-width="1" opacity="0.6"/>
  <text x="170" y="110" text-anchor="middle" fill="#3fcf8e" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="2">SUPABASE TABLES</text>

  <!-- Table boxes -->
  <rect x="50" y="125" width="240" height="45" rx="5" fill="#3fcf8e" opacity="0.08" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="70" y="146" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">game_sessions</text>
  <text x="70" y="162" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">phase · round · tension · winner</text>

  <rect x="50" y="180" width="240" height="55" rx="5" fill="#3fcf8e" opacity="0.08" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="70" y="201" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">game_characters</text>
  <text x="70" y="217" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">name · public_role · emotional_state (public)</text>
  <text x="70" y="229" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">faction · hidden_role · win_condition (private)</text>

  <rect x="50" y="245" width="240" height="45" rx="5" fill="#3fcf8e" opacity="0.08" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="70" y="266" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">game_messages</text>
  <text x="70" y="282" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">speaker · content · phase · is_public</text>

  <rect x="50" y="300" width="240" height="45" rx="5" fill="#3fcf8e" opacity="0.08" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="70" y="321" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">game_votes</text>
  <text x="70" y="337" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">voter · target · round</text>

  <rect x="50" y="355" width="240" height="45" rx="5" fill="#3fcf8e" opacity="0.08" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="70" y="376" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">game_night_actions</text>
  <text x="70" y="392" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">character · action_type · target · result</text>

  <text x="170" y="430" text-anchor="middle" fill="#3fcf8e" font-family="Inter,system-ui,sans-serif" font-size="9" opacity="0.4">WAL replication →</text>

  <!-- ==================== CENTER: PowerSync Cloud Streams ==================== -->
  <rect x="350" y="85" width="340" height="490" rx="8" fill="#1a1a3a" stroke="#c44dff" stroke-width="1.2" opacity="0.7"/>
  <text x="520" y="110" text-anchor="middle" fill="#c44dff" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="2">SYNC STREAMS</text>

  <!-- Public streams -->
  <text x="370" y="138" fill="#3fcf8e" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1">PUBLIC (all session players)</text>

  <rect x="370" y="148" width="300" height="38" rx="4" fill="url(#streamPublic)" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="385" y="166" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600">game_session</text>
  <text x="385" y="180" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.5">WHERE session_id = params.session_id</text>

  <rect x="370" y="193" width="300" height="38" rx="4" fill="url(#streamPublic)" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="385" y="211" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600">public_characters</text>
  <text x="385" y="225" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.5">Public columns only — no hidden_role, no faction</text>

  <rect x="370" y="238" width="300" height="38" rx="4" fill="url(#streamPublic)" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="385" y="256" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600">game_messages</text>
  <text x="385" y="270" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.5">WHERE is_public = true</text>

  <rect x="370" y="283" width="300" height="38" rx="4" fill="url(#streamPublic)" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="385" y="301" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600">game_votes</text>
  <text x="385" y="315" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.5">WHERE session_id = params.session_id</text>

  <!-- Private streams -->
  <text x="370" y="348" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1">PRIVATE (character owner only)</text>

  <rect x="370" y="358" width="300" height="48" rx="4" fill="url(#streamPrivate)" stroke="#ef4444" stroke-width="0.5"/>
  <text x="385" y="376" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600">my_hidden_role</text>
  <text x="385" y="390" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.6">WHERE player_user_id = auth.user_id()</text>
  <text x="385" y="401" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.4">faction · hidden_role · win_condition · hidden_knowledge</text>

  <rect x="370" y="413" width="300" height="48" rx="4" fill="url(#streamPrivate)" stroke="#ef4444" stroke-width="0.5"/>
  <text x="385" y="431" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600">my_night_actions</text>
  <text x="385" y="445" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.6">JOIN game_characters WHERE player_user_id = auth.user_id()</text>
  <text x="385" y="456" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="7" opacity="0.4">action_type · target · result (own actions only)</text>

  <text x="520" y="490" text-anchor="middle" fill="#c44dff" font-family="Inter,system-ui,sans-serif" font-size="9" opacity="0.4">delta sync →</text>

  <!-- ==================== RIGHT: Client Local SQLite ==================== -->
  <rect x="730" y="85" width="440" height="490" rx="8" fill="#1a1a3a" stroke="#6366f1" stroke-width="1" opacity="0.6"/>
  <text x="950" y="110" text-anchor="middle" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="2">CLIENT-SIDE (Per Browser)</text>

  <!-- WASM SQLite box -->
  <rect x="750" y="125" width="400" height="55" rx="5" fill="#6366f1" opacity="0.08" stroke="#6366f1" stroke-width="0.5"/>
  <text x="770" y="148" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">WASM SQLite (OPFS VFS)</text>
  <text x="770" y="165" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">@powersync/web 1.36 · SharedWorker multi-tab · Offline-capable</text>

  <!-- Reactive Queries box -->
  <rect x="750" y="190" width="400" height="55" rx="5" fill="#6366f1" opacity="0.08" stroke="#6366f1" stroke-width="0.5"/>
  <text x="770" y="213" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Reactive Queries (usePowerSyncGameState)</text>
  <text x="770" y="230" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">useQuery() — auto-re-render on data change · 5 watched tables</text>

  <!-- Merge Logic box -->
  <rect x="750" y="255" width="400" height="65" rx="5" fill="#c44dff" opacity="0.06" stroke="#c44dff" stroke-width="0.5"/>
  <text x="770" y="278" fill="#d8b4fe" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">State Merge (useGameState)</text>
  <text x="770" y="295" fill="#d8b4fe" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">useEffect: merge PS diffs into React state only when values differ</text>
  <text x="770" y="308" fill="#d8b4fe" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">SSE takes priority for real-time · PowerSync reconciles on reconnect</text>

  <!-- Auth box -->
  <rect x="750" y="335" width="190" height="55" rx="5" fill="#3fcf8e" opacity="0.06" stroke="#3fcf8e" stroke-width="0.5"/>
  <text x="770" y="358" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Supabase JWT</text>
  <text x="770" y="375" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">Passed to PowerSync Cloud</text>
  <text x="770" y="387" fill="#86efac" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">→ evaluates auth.user_id()</text>

  <!-- Write path box -->
  <rect x="960" y="335" width="190" height="55" rx="5" fill="#ff6b35" opacity="0.06" stroke="#ff6b35" stroke-width="0.5"/>
  <text x="980" y="358" fill="#fdba74" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">Write Path</text>
  <text x="980" y="375" fill="#fdba74" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">All writes via FastAPI HTTP</text>
  <text x="980" y="387" fill="#fdba74" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.5">uploadData() = no-op</text>

  <!-- Key insight -->
  <rect x="750" y="410" width="400" height="75" rx="5" fill="#0d0d18" stroke="#ff6b35" stroke-width="0.8" opacity="0.8"/>
  <text x="770" y="432" fill="#ff6b35" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600">KEY DESIGN DECISION</text>
  <text x="770" y="450" fill="#c8c8e0" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.7">PowerSync handles read sync only. Game logic validation happens server-side</text>
  <text x="770" y="464" fill="#c8c8e0" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.7">via FastAPI before writes reach Supabase. This prevents cheating — clients</text>
  <text x="770" y="478" fill="#c8c8e0" font-family="Inter,system-ui,sans-serif" font-size="8" opacity="0.7">can't write directly to the database, only the validated backend can.</text>

  <!-- ==================== FLOW ARROWS ==================== -->
  <!-- Supabase → PowerSync Cloud -->
  <line x1="310" y1="250" x2="348" y2="250" stroke="#3fcf8e" stroke-width="1.2" marker-end="url(#arrowGreen)" opacity="0.6"/>

  <!-- PowerSync Cloud → Client -->
  <line x1="690" y1="250" x2="728" y2="250" stroke="#c44dff" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Bottom labels -->
  <text x="200" y="560" text-anchor="middle" fill="#3fcf8e" font-family="Inter,system-ui,sans-serif" font-size="9" opacity="0.4">SOURCE OF TRUTH</text>
  <text x="520" y="560" text-anchor="middle" fill="#c44dff" font-family="Inter,system-ui,sans-serif" font-size="9" opacity="0.4">PERMISSION FILTER</text>
  <text x="950" y="560" text-anchor="middle" fill="#6366f1" font-family="Inter,system-ui,sans-serif" font-size="9" opacity="0.4">LOCAL-FIRST CLIENT</text>
</svg>
